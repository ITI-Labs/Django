{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Student Manager{% endblock %}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f5f5f5}
        nav{background:#333;padding:15px 30px;display:flex;gap:20px;align-items:center}
        nav a{color:white;text-decoration:none;padding:8px 15px;border-radius:5px}
        nav a:hover{background:#555}
        .nav-right{margin-left:auto;display:flex;gap:15px;align-items:center;color:white}
        main{padding:30px;max-width:1200px;margin:auto}
        .card{background:white;border-radius:8px;padding:20px;margin:15px 0;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        th{background:#f8f9fa}
        .btn{display:inline-block;padding:8px 16px;border-radius:5px;text-decoration:none;color:white;border:none;cursor:pointer;font-size:14px}
        .btn-primary{background:#007bff}
        .btn-success{background:#28a745}
        .btn-warning{background:#ffc107;color:black}
        .btn-danger{background:#dc3545}
        .btn-sm{padding:5px 10px;font-size:12px}
        input,select,textarea{padding:8px;border:1px solid #ddd;border-radius:5px;width:100%;margin:5px 0}
        label{font-weight:bold;display:block;margin-top:10px}
        .error{color:#dc3545;padding:10px;background:#f8d7da;border-radius:5px;margin:10px 0}
        .success{color:#28a745;padding:10px;background:#d4edda;border-radius:5px;margin:10px 0}
        img{max-width:100px;border-radius:5px}
    </style>
</head>
<body>
<nav>
    <a href="{% url 'home_page' %}">Home</a>
    {% if user.is_authenticated %}
    <a href="{% url 'student_filter' %}">Students</a>
    <a href="{% url 'course_filter' %}">Courses</a>
    <a href="{% url 'teacher_filter' %}">Teachers</a>
    <div class="nav-right">
        <span>{{ user.username }}</span>
        <a href="{% url 'logout_view' %}" style="background:#dc3545">Logout</a>
    </div>
    {% endif %}
</nav>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
